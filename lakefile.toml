name = "MeasureToMeasure"
defaultTargets = ["MeasureToMeasure", "ForMathlib", "Regression"]
testDriver = ""
# `lake lint` runs Batteries' environment linters (Mathlib's own pattern: Mathlib declares
# `lintDriver = "batteries/runLinter"` + `lintDriverArgs = #["Mathlib"]`). Passing the two root
# modules lints every declaration in both packages in one pass; deliberate exemptions live in
# scripts/nolints.json (maintained with `lake exe runLinter --update`).
lintDriver = "batteries/runLinter"
lintDriverArgs = ["MeasureToMeasure", "ForMathlib"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

# The `checkdecls` executable that `leanblueprint checkdecls` / CI shells out to
# (`lake exe checkdecls blueprint/lean_decls`): confirms every `\lean{...}` name in the blueprint
# resolves and compiles. No rev pinned -- matches what `leanblueprint new` itself adds; lake
# pins the resolved commit into lake-manifest.json on `lake update checkdecls`.
[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[lean_lib]]
name = "MeasureToMeasure"

[[lean_lib]]
name = "ForMathlib"

# The refutation regression suite's MUST-PASS half: kernel-checked disproofs of historical
# false axiom statements (Regression/Refuted/) and per-axiom non-vacuity witnesses
# (Regression/NonVacuity/). The MUST-FAIL half lives in Refutations/, which is deliberately
# NOT a build target (those files must fail to elaborate); scripts/refutation-gate.sh checks it.
[[lean_lib]]
name = "Regression"
