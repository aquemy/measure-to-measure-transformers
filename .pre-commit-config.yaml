# Conventional Knowledge Commits: validate commit messages against the CKC convention,
# and (opt-in) cross-check proof-honesty footers against the Lean kernel.
# Install once:  pre-commit install --hook-type commit-msg
# Profiles are read from .ckc.toml (proof, science).
repos:
  - repo: https://github.com/hotherio/ckc-tools
    rev: v0.3.0
    hooks:
      - id: ckc
        stages: [commit-msg]
      - id: ckc-axiom-check
        stages: [commit-msg]
