# claims.toml: the CKC claim registry for measure-to-measure-transformers.
#
# One entry per slugged claim. The slug (table key) is what commit footers reference as
# `claim:<slug>` / `conjecture:<slug>`. `status` is a CACHE of the effective status computed from
# the commit graph; regenerate it, do not treat it as the source of truth.
#
# Source paper: Geshkovski, Rigollet, Ruiz-Balet, "Measure-to-measure interpolation using
# Transformers", arXiv:2411.04551v3 (references/paper.pdf).
#
# Status legend (axis 2, epistemic):
#   math.proved-informal  the paper proves it; reviewed by us, no Lean proof yet
#   math.axiomatised      stated in Lean, rests on a cited axiom (missing from Mathlib)
#   math.machine-checked  clean Lean kernel proof (Axioms: only propext/Classical.choice/Quot.sound)
#   sci.measured          a seeded numerical experiment ran and met its pass criterion

# ===========================================================================
# Main results
# ===========================================================================

[claims.thm-1-1]
kind      = "conjecture"
statement = "Theorem 1.1: for Dirac targets sharing a missing direction, a single Transformer steers N inputs to within eps in W2, with O(d N) switches and norm O(dN/T + log 1/eps)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.theorem_1_1"
paper     = "Thm 1.1, p.5"
created   = "2026-06-30"

[claims.thm-1-2]
kind      = "conjecture"
statement = "Theorem 1.2: for targets matchable by transport maps and a shared missing direction, a single Transformer steers N inputs to within eps in W2 with piecewise-constant parameters."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.theorem_1_2"
paper     = "Thm 1.2, p.5"
created   = "2026-06-30"

# ===========================================================================
# Backbone propositions and lemmas
# ===========================================================================

[claims.prop-2-1]
kind      = "conjecture"
statement = "Proposition 2.1: attention with parameter B clusters a single-hemisphere measure to a point mass; diam(conv_g supp mu(t)) -> 0 with rate O(log 1/eps)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_2_1"
paper     = "Prop 2.1, p.11"
created   = "2026-06-30"

[claims.prop-2-2]
kind      = "conjecture"
statement = "Proposition 2.2: an atomless probability measure can be driven W2-close to a prescribed M-atom discrete measure (convex weights). PROVED (needs 0<d): partition into probability pieces of mass alpha_k with pairwise disjoint supports (exists_atomless_partition); per piece rotate into the orthant with one switch (lemma_3_2), which lies in a basis direction's open hemisphere, then cluster to its target point (cluster_to_point) composing the schedules; run all pieces with one parked schedule (exists_parked_schedule), then lift per-piece bounds via the convexity of W2 under mixtures (W2_convexCombo_le); the convex-combination bookkeeping is machine-checked."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_2_2"
paper     = "Prop 2.2, p.11"
created   = "2026-06-30"

[claims.prop-3-1]
kind      = "conjecture"
statement = "Proposition 3.1: a piecewise-constant theta disentangles the supports of N measures (pairwise disjoint, each in a hemisphere). PROVED from exists_disentangling_balls: the disjointness + hemisphere packaging is machine-checked (Metric.ball_disjoint_ball + Cauchy-Schwarz), closing the F2 hand-wave; the dynamical construction is the more primitive axiom."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_3_1"
paper     = "Prop 3.1, p.15"
created   = "2026-06-30"

[claims.axiom-disentangle-balls]
kind      = "conjecture"
statement = "Disentanglement dynamics output (Section 3.3): one schedule concentrates each measure into a small ball B(alpha_i, r), r<1, around a unit direction alpha_i, with directions pairwise 2r-separated. The concrete geometric output of Lemmas 3.2-3.4 run as the Section 3.3 induction (leaf L11 the geometric core); rests on the missing continuity-equation theory."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.exists_disentangling_balls"
paper     = "Prop 3.1 / Sec 3.3, p.15-17"
created   = "2026-06-30"

[claims.lem-3-2]
kind      = "conjecture"
statement = "Lemma 3.2: one switch of W transports measures not filling the sphere into the positive orthant cap Q_1^{d-1}."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_3_2"
paper     = "Lem 3.2, p.15"
created   = "2026-06-30"

[claims.lem-3-3]
kind      = "conjecture"
statement = "Lemma 3.3: if barycenters are pairwise non-colinear, a piecewise-constant theta shrinks one measure's geodesic convex hull into a small ball around its barycenter direction."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_3_3"
paper     = "Lem 3.3, p.16"
created   = "2026-06-30"

[claims.lem-3-4]
kind      = "conjecture"
statement = "Lemma 3.4: two measures can be made non-colinear in barycenter, via the perceptron (gamma1=1) or via attention (gamma1!=1)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_3_4_part1"
paper     = "Lem 3.4, p.16"
created   = "2026-06-30"

[claims.prop-4-1]
kind      = "conjecture"
statement = "Proposition 4.1: M distinct points x_0^i can be steered exactly to distinct y^i, using at most 6M switches. PROVED by induction on M over Proposition 4.2 and the structural flow algebra (idParams base case; comp/switches_comp step placing one more point; flowMap_comp); the 6M switch budget is machine-checked."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_4_1"
paper     = "Prop 4.1, p.18"
created   = "2026-06-30"

[claims.prop-4-2]
kind      = "conjecture"
statement = "Proposition 4.2: with distinct inputs/targets and the first M-1 points already at their targets, the single active point x_0^M is steered to y^M while the inactive points stay fixed, via gather/corridor/restore, with at most 6 switches. (Injectivity hypotheses added for soundness: the flow is bijective.)"
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_4_2"
paper     = "Prop 4.2, p.18"
created   = "2026-06-30"

[claims.lem-5-1]
kind      = "conjecture"
statement = "Lemma 5.1: transport maps T^i are preserved by the disentangling flow maps; there is a Lipschitz invertible psi with the stated pushforward identity."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_5_1"
paper     = "Lem 5.1, p.24"
created   = "2026-06-30"

[claims.lem-5-2]
kind      = "conjecture"
statement = "Lemma 5.2 (linearized OT bound): W2(T1_# mu, T2_# mu) <= ||T1 - T2||_{L2(mu)} for measurable T1, T2 with T1 bijective."
status    = "math.proved-informal"
lean      = "MeasureToMeasure.lemma_5_2"
paper     = "Lem 5.2, p.24"
created   = "2026-06-30"

[claims.lem-5-4]
kind      = "conjecture"
statement = "Lemma 5.4: any psi in L2(S^{d-1}; S^{d-1}) is approximated in L2(mu) by a flow map of the continuity equation with finitely many switches."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_5_4"
paper     = "Lem 5.4, p.24"
created   = "2026-06-30"

[claims.lem-b-1]
kind      = "conjecture"
statement = "Lemma B.1: through a chain of K+1 consecutively overlapping balls, K switches retain mass mu(T, B_K) >= (1-eps)^K mu(B_0) (the mass starting in the first ball, funneled along the chain). PROVED by induction over Lemma B.2 + the structural flow algebra (the only axioms). Statement corrected from the stub's mu(union B_k), which makes K=0 false."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_B_1"
paper     = "Lem B.1, p.31"
created   = "2026-06-30"

[claims.lem-b-2]
kind      = "conjecture"
statement = "Lemma B.2: through a single overlapping ball pair, mass mu(T, B0 cap B1) >= (1-eps) mu_0(B0), via the ReLU-gated drift toward an interior anchor."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_B_2"
paper     = "Lem B.2, p.31"
created   = "2026-06-30"

[claims.lem-a-1]
kind      = "conjecture"
statement = "Lemma A.1: the support condition (1.5) can be removed at O(eta) cost in W2 by a curated input perturbation."
status    = "math.proved-informal"
lean      = "MeasureToMeasure.lemma_a_1"
paper     = "Lem A.1, p.30"
created   = "2026-06-30"

[claims.prop-6-2]
kind      = "conjecture"
statement = "Proposition 6.2: for generic i.i.d. discrete inputs, a single constant parameter disentangles all measures almost surely (limit clusters are distinct)."
status    = "math.proved-informal"
lean      = "MeasureToMeasure.prop_6_2"
paper     = "Prop 6.2, p.29"
created   = "2026-06-30"

# ===========================================================================
# Self-contained leaf computations (targets for kernel-checked Lean proofs L1-L10)
# ===========================================================================

[claims.leaf-projector]
kind      = "conjecture"
statement = "L1: the tangential projector P_x^perp = I - x x^T is symmetric, idempotent, kills x, and satisfies <P_x^perp v, v> = ||v||^2 - <x,v>^2 for ||x||=1."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.projector_inner_sub_sq"
paper     = "sec 1.2 / 1.5"
created   = "2026-06-30"

[claims.leaf-gate-ode]
kind      = "conjecture"
statement = "L2: with U=-1 z^T, b=cos(R) 1, W 1 = omega, the ReLU gate equals (cos R - <z,x>)_+ and d/dt <x,omega> = (1 - <x,omega>^2)(cos R - cos d_g(z,x))_+ (eq. B.4-B.5)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.gate_hasDerivAt_inner"
paper     = "eq. B.4-B.5, p.32"
created   = "2026-06-30"

[claims.leaf-sep-hyperplane]
kind      = "conjecture"
statement = "L3: monotonicity of cos gives <omega, x_0^M> - cos(pi/8 + tau) < 0 when d_g(omega, x_0^M) >= pi/2 and tau in (0, 3pi/8) (Prop 4.2 Step 1 separating hyperplane)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.separating_hyperplane"
paper     = "Prop 4.2 Step 1, p.20"
created   = "2026-06-30"

[claims.leaf-geodesic-grad]
kind      = "conjecture"
statement = "L4: the Riemannian gradient of geodesic distance is grad_1 d_g(x, omega) = - P_x^perp omega / sqrt(1 - <x,omega>^2)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.geodesicDist_hasDerivAt"
paper     = "eq. after 4.4, p.20"
created   = "2026-06-30"

[claims.leaf-lyapunov]
kind      = "conjecture"
statement = "L5: for E(theta) = 1 - cos theta along theta' = -alpha sin theta, the derivative is E' = -alpha sin^2 theta <= 0 (Example 6.1 Lyapunov function)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.lyapunov_hasDerivAt"
paper     = "Example 6.1, p.29"
created   = "2026-06-30"

[claims.leaf-barycenter-ode]
kind      = "conjecture"
statement = "L6: along d/dt <x,alpha> = c (1 - <alpha,x>^2) with c != 0 of fixed sign, the inner product is monotone and converges to +-1 (sign of c), i.e. x -> +-alpha (eq. B.9)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.barycenter_hasDerivAt_inner"
paper     = "eq. B.9, p.33"
created   = "2026-06-30"

[claims.leaf-coupling-bound]
kind      = "conjecture"
statement = "L7: the map-induced coupling gives W2^2(T1_# mu, T2_# mu) <= integral ||T1 - T2||^2 d mu (the core of Lemma 5.2)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Leaves.lemma_5_2"
paper     = "Lem 5.2, p.24"
created   = "2026-06-30"

[claims.leaf-markov-bound]
kind      = "conjecture"
statement = "L8: if W2(mu, delta_{x0}) <= eta2 then 1 - mu(B(x0, eta3)) <= C eta2 / eta3, via a Lipschitz bump and W1 duality (Claim 2)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Leaves.markov_bound"
paper     = "Claim 2, p.39"
created   = "2026-06-30"

[claims.leaf-ball-chain-induction]
kind      = "conjecture"
statement = "L9: if each step multiplies retained mass by at least (1-eps), then after K steps mu(T, B_K) >= (1-eps)^K mu_0(union B_k) (Lemma B.1 induction, abstracted)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.ball_chain_geom"
paper     = "Lem B.1 proof, p.33"
created   = "2026-06-30"

[claims.leaf-pigeonhole]
kind      = "conjecture"
statement = "L10: a function that is constant on an open ball forces the stated barycenter identity to fail, so some x* in B makes the two barycenters differ (Lemma 3.4 Part 1)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.exists_ne_in_ball"
paper     = "Lem 3.4 Part 1, p.35"
created   = "2026-06-30"

[claims.leaf-barycenter-noncolinear]
kind      = "conjecture"
statement = "L11: empirical measures in the orthant (geodesic hull modeled as cone(s) cap sphere) with disjoint geodesic hulls have non-colinear barycenters (not SameRay). Discharges review finding F2: the implication Prop 3.1's induction asserts without proof, for the empirical regime of Thm 1.1 and restricted Thm 1.2. General-measure case adds only 'barycenter in closed convex hull of support'."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.barycenter_noncolinear_of_disjoint_hull"
paper     = "Prop 3.1 induction, p.16-17 (finding F2)"
created   = "2026-06-30"

[claims.leaf-barycenter-noncolinear-general]
kind      = "conjecture"
statement = "L11': finding F2 for arbitrary probability measures. Two probability measures supported in disjoint closed convex cones have non-colinear (not SameRay) barycenters, via Mathlib's Convex.integral_mem (barycenter in any closed convex set carrying full mass). Closes the general-measure residual of F2 with no new axioms."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.barycenter_noncolinear_of_disjoint_hull_general"
paper     = "Prop 3.1 induction, p.16-17 (finding F2, general case)"
created   = "2026-06-30"

# ===========================================================================
# Meta nodes (infrastructure, not mathematical claims)
# ===========================================================================

[claims.meta-coverage-map]
kind      = "review"
statement = "Mathlib v4.31.0 coverage of the prerequisites: optimal transport / W2, continuity-equation flows, geodesic convexity, LaSalle and Hartman-Grobman are absent; sphere, inner-product algebra, and ODE existence/Gronwall are present."
status    = "math.proved-informal"
paper     = "n/a (infrastructure)"
created   = "2026-06-30"

[claims.meta-axiom-layer]
kind      = "review"
statement = "The labeled axiom layer: W2/W1 with the coupling and KR-duality bounds, and the continuity-equation flow map with its Lipschitz/bijective/parked-identity properties, standing in for the missing Mathlib theory."
status    = "math.axiomatised"
paper     = "n/a (infrastructure)"
created   = "2026-06-30"

[claims.axiom-flow-algebra]
kind      = "review"
statement = "Structural flow algebra (Axioms/Dynamics.lean): schedule composition comp with measureFlow_comp/flowMap_comp, switch sub-additivity switches_comp, the identity schedule idParams, time-reversal inv with measureFlow_inv, and the pushforward identity measureFlow_map (Phi_theta^t mu = (Phi_theta^t)_# mu). Standard continuity-equation semigroup facts, absent from Mathlib; used to assemble the construction."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Axioms.measureFlow_map"
paper     = "n/a (structural infrastructure)"
created   = "2026-06-30"

[claims.axiom-parking]
kind      = "conjecture"
statement = "Parking / simultaneous action (Appendix B): if a family of measures has pairwise disjoint supports and each member can be steered to within eps of its target by some schedule, a single schedule steers all of them simultaneously (each gated to its region, parking on the others)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.exists_parked_schedule"
paper     = "App. B parking, p.31-39"
created   = "2026-06-30"

[claims.cluster-to-point]
kind      = "conjecture"
statement = "Single-measure controllability (Prop 2.1 + Prop 4.1): a probability measure in an open hemisphere can be driven W2-close to the Dirac mass at any prescribed point, by clustering then steering the cluster. Lifted to a family by disentanglement and parking in Theorem 1.1."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.cluster_to_point"
paper     = "Prop 2.1 + Prop 4.1"
created   = "2026-06-30"

[claims.axiom-w2-convexity]
kind      = "conjecture"
statement = "Convexity of W2 under mixtures: for probability measures with shared weights, W2(sum a_k P_k, sum a_k Q_k) is at most the uniform bound on the component distances (gluing of couplings, W2(mix)^2 <= sum a_k W2(P_k,Q_k)^2). Standard optimal-transport fact, absent from Mathlib."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Axioms.W2_convexCombo_le"
paper     = "Prop 2.2 (OT mixture bound)"
created   = "2026-07-01"

[claims.axiom-atomless-partition]
kind      = "conjecture"
statement = "Atomless decomposition (Sierpinski/Lyapunov splitting): an atomless probability measure splits into M probability pieces with prescribed convex weights and pairwise disjoint supports. The prescribed-mass partition step of Proposition 2.2 (Fremlin, Measure Theory Vol.2, 215D); absent from Mathlib. Soundness fix: the earlier per-piece hemisphere clause was inconsistent at M=1 and was dropped; prop_2_2 now acquires the hemisphere dynamically per piece via lemma_3_2."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.exists_atomless_partition"
paper     = "Prop 2.2 (packing balls), p.11"
created   = "2026-07-01"

