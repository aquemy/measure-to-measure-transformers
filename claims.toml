[claims.prop-2-1]
kind      = "conjecture"
statement = "Proposition 2.1: attention with parameter B clusters a single-hemisphere measure to a point mass; diam(conv_g supp mu(t)) -> 0 with rate O(log 1/eps). SOUNDNESS FIX (2026-07-03, F12): sphere support on mu and the on-sphere location of the cluster point z restored (the paper's P(S^{d-1})); the one-piece budget (attention-only constant parameter (V,B,W)=(I_d,B,0)) is now explicit. MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow with durationSum = T (the clustering IS the self-attention dynamics; one constant piece, (V,B,W) = (I,B,0))."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_2_1"
paper     = "Prop 2.1, p.11"
created   = "2026-06-30"

[claims.prop-2-2]
kind      = "conjecture"
statement = "Proposition 2.2: an atomless probability measure on the sphere whose support misses a cap can be driven W2-close to a prescribed M-atom discrete measure on the sphere (convex weights), with at most 9M switch pieces. PROVED (needs 3<=d, positive weights alpha_k != 0): partition into probability pieces of mass alpha_k with pairwise disjoint supports (exists_atomless_partition); per piece rotate into the orthant with two pieces (lemma_3_2), which lies in a basis direction's open hemisphere, then cluster to its target point (cluster_to_point, seven pieces) composing the schedules; run all pieces with one parked schedule (exists_parked_schedule, sum of budgets = 9M), then lift per-piece bounds via the convexity of W2 under mixtures (W2_convexCombo_le); the convex-combination bookkeeping is machine-checked. The MissingCap hypothesis is an artifact of the linear-model route via lemma_3_2 (the paper's Section 2 clustering proof does not need it); to be revisited with the mean-field restatement (F14). LAYER FIX (2026-07-03, F14): back to a labeled AXIOM on the LINEAR layer -- the paper's own Section 2.2 proof is a gated perceptron construction (V = 0), so the linear statement is faithful; the former machine-checked assembly (split + attention-cluster + park + mixture linearity) is invalid under mean-field dynamics because a mixture evolves as one system (its flow is not the mixture of its pieces' flows). The MissingCap hypothesis and 9M budget (artifacts of that route) are dropped; honest re-derivation is a future assembly over lemma_B_1 (M4). Depends-On exists_atomless_partition, lemma_B_1."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_2_2"
paper     = "Prop 2.2, p.11"
created   = "2026-06-30"

[claims.prop-3-1]
kind      = "conjecture"
statement = "Proposition 3.1: a piecewise-constant theta disentangles the supports of N measures (pairwise disjoint, each in a hemisphere). PROVED from exists_disentangling_balls: the disjointness + hemisphere packaging is machine-checked (Metric.ball_disjoint_ball + Cauchy-Schwarz), closing the F2 hand-wave; the dynamical construction is the more primitive axiom. MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow with durationSum = T; gains the paper's probability/sphere-support/pairwise-distinct hypotheses; proved from the restated exists_disentangling_balls (geometric packaging unchanged)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_3_1"
paper     = "Prop 3.1, p.15"
created   = "2026-06-30"

[claims.axiom-disentangle-balls]
kind      = "conjecture"
statement = "Disentanglement dynamics output (Section 3.3): one schedule concentrates each measure into a small ball B(alpha_i, r), r<1, around a unit direction alpha_i, with directions pairwise 2r-separated. The concrete geometric output of Lemmas 3.2-3.4 run as the Section 3.3 induction (leaf L11 the geometric core); rests on the missing continuity-equation theory. MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow -- eq. (1.7) proves NO measure-independent flow can disentangle overlapping inputs, and the linear form was kernel-refuted (dense-atoms disproof; two identical Diracs cannot enter disjoint balls under one map). Now requires probability + sphere support + the paper's standing assumption mu_0^i != mu_0^j and the gap-form SharedMissingDirection; the conclusion also exposes per-member measurable flow maps with measurable on-sphere inverses (the paper's Lipschitz-invertible phi^t, eq. B.2). O(dN) switch budget deferred (non-explicit constant). The old refutation no longer typechecks."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.exists_disentangling_balls"
paper     = "Prop 3.1 / Sec 3.3, p.15-17"
created   = "2026-06-30"

[claims.lem-3-2]
kind      = "conjecture"
statement = "Lemma 3.2: two constant parameter pieces transport a sphere-supported probability measure whose support misses a cap into the positive orthant cap Q_1^{d-1}. SOUNDNESS FIX (2026-07-03, F12): the stub quantified over EVERY measure and was kernel-refuted with the Lebesgue measure (flowMap is a Lipschitz bijection, so an open-positive infinite measure cannot be annihilated off the orthant); restored the paper's P(S^{d-1}) + union-of-supports-proper hypotheses (MissingCap). Budget convention: Lean's switches counts constant pieces; the paper's 'one switch' = two pieces (W_1 pushing off -omega, then W_2 pulling toward alpha)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_3_2"
paper     = "Lem 3.2, p.15"
created   = "2026-06-30"

[claims.lem-3-3]
kind      = "conjecture"
statement = "Lemma 3.3 (single-measure core): a sphere-supported probability measure on the orthant can be concentrated into an eps-ball around a unit direction alpha. SOUNDNESS FIX (2026-07-03, F12): the stub quantified over EVERY measure and was kernel-refuted with the Lebesgue measure; restored probability + sphere + orthant support (the paper's P(Q_1^{d-1}) context, applied after Lemma 3.2) and alpha on the sphere. The paper's family form (fixing the other measures, O(dN) switches with a non-explicit constant) is deferred to the mean-field restatement (F14). MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow with durationSum = T (the paper's construction switches on the value matrix V, so the field reads the flowing measure's barycenter); alpha now on the sphere."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_3_3"
paper     = "Lem 3.3, p.16"
created   = "2026-06-30"

[claims.lem-3-4]
kind      = "conjecture"
statement = "Lemma 3.4: two DISTINCT probability measures on the orthant cap Q_1^{d-1} can be made non-colinear in barycenter, via the perceptron (gamma1=1, equal barycenters: part1) or via attention (gamma1 in (0,1), colinear-but-unequal barycenters: part2). SOUNDNESS FIX (2026-07-03): the original stubs dropped the paper's hypotheses -- part1 kept only equal-barycenters (refutable by mu=nu) and part2 kept NONE (refutable by mu=nu, since SameRay v v always holds); F11 restored mu != nu, IsProbabilityMeasure, orthant support, and part2's gamma in (0,1) colinearity. SECOND FIX (2026-07-03, F12): sphere supports added -- with only the AMBIENT orthant the statements stayed refutable via heavy-tailed orthant measures whose identity is not Bochner-integrable (both barycenters are the junk value 0, and SameRay 0 0 holds); on the sphere the barycenters are genuine. All refutations machine-checked. Orphan axioms (not in the footprint of theorem_1_1/theorem_1_2). LAYER SPLIT (2026-07-03, F14): part1 STAYS LINEAR (the paper's construction has V = 0, measure-independent); part2 moves to AttnSchedule/attnMeasureFlow with durationSum = T (its construction has V != 0, B = 0: barycenter-driven)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_3_4_part1"
paper     = "Lem 3.4, p.16"
created   = "2026-06-30"

[claims.prop-4-1]
kind      = "conjecture"
statement = "Proposition 4.1: M distinct points of the sphere x_0^i can be steered exactly to distinct on-sphere y^i, using at most 6M switches. PROVED by induction on M over Proposition 4.2 and the structural flow algebra (idParams base case; comp/switches_comp step placing one more point; flowMap_comp); the 6M switch budget is machine-checked. Sphere memberships threaded through the induction via flowMap_mem_sphere (F12)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_4_1"
paper     = "Prop 4.1, p.18"
created   = "2026-06-30"

[claims.prop-4-2]
kind      = "conjecture"
statement = "Proposition 4.2: with distinct inputs/targets ON THE SPHERE and the first M-1 points already at their targets, the single active point x_0^M is steered to y^M while the inactive points stay fixed, via gather/corridor/restore, with at most 6 switches. (Injectivity hypotheses added for soundness: the flow is bijective. Sphere memberships added 2026-07-03, F12: without them the axiom contradicts the kernel-checked flowMap_mem_sphere -- it would steer e_1 to 2e_1.)"
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.prop_4_2"
paper     = "Prop 4.2, p.18"
created   = "2026-06-30"

[claims.lem-5-1]
kind      = "conjecture"
statement = "Lemma 5.1: after DISENTANGLEMENT (both the source family mu_0 and the target family mu_1 have pairwise disjoint supports, as Proposition 3.1 provides for mu^i_0 and mu^i_1), the per-pair transport maps T^i glue into a single measurable psi with the stated pushforward identity. SOUNDNESS FIX (2026-07-03, F11): the original stub dropped the disjoint-supports context, making it refutable with Diracs. SECOND FIX (2026-07-03, F13): the conclusion's Function.Bijective was unsatisfiable even with disjoint supports (an atomless source with a Dirac target is matchable, and no injection pushes an atomless measure onto an atom); the paper's own proof (B.4) delivers only a non-invertible Lipschitz psi, so 'invertible' in the printed Lemma 5.1 is a statement/proof mismatch (erratum candidate E2). Conclusion now: Measurable psi. Orphan axiom."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_5_1"
paper     = "Lem 5.1, p.24"
created   = "2026-06-30"

[claims.lem-5-2]
kind      = "conjecture"
statement = "Lemma 5.2 (linearized OT bound): W2(T1_# mu, T2_# mu) <= ||T1 - T2||_{L2(mu)} for measurable T1, T2 with T1 bijective."
status    = "math.proved-informal"
lean      = "MeasureToMeasure.lemma_5_2"
paper     = "Lem 5.2, p.24"
created   = "2026-06-30"

[claims.lem-5-4]
kind      = "conjecture"
statement = "Lemma 5.4: any measurable a.e. sphere-valued psi on a sphere-supported probability measure mu is approximated in L2(mu) by a flow map of the continuity equation with finitely many switches. SOUNDNESS FIX (2026-07-03, F12): the stub quantified over every measure and every psi and was refutable (flow approximants are sphere-valued on sphere mass, so psi = const 3e_1 keeps every approximant at L2 distance >= 2); restored the paper's mu in P(S^{d-1}) and psi in L2(S^{d-1}; S^{d-1}). MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow with durationSum = T (the density argument ranges over the full attention dynamics)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_5_4"
paper     = "Lem 5.4, p.24"
created   = "2026-06-30"

[claims.lem-b-1]
kind      = "conjecture"
statement = "Lemma B.1: through a chain of K+1 consecutively overlapping proper geodesic caps (radii in (0, pi), d >= 2), K pieces retain mass mu(T, B_K) >= (1-eps)^K mu(B_0) (the mass starting in the first ball, funneled along the chain). PROVED by induction over Lemma B.2 + the structural flow algebra (the only axioms). The paper's stronger mu(union B_k) form is out of reach NOT because of any K=0 base-case issue (the bounded union at K=0 IS B_0) but because the Lean lemma_B_2 drops the paper's localization clause (flow = Id off B_0) and the |k-k'| >= 2 disjointness hypothesis (F16)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_B_1"
paper     = "Lem B.1, p.31"
created   = "2026-06-30"

[claims.lem-b-2]
kind      = "conjecture"
statement = "Lemma B.2: through a single overlapping ball pair (proper geodesic caps, radii in (0, pi), centers on the sphere, d >= 2), one gated piece retains mass mu(T, B0 cap B1) >= (1-eps) mu_0(B0), via the ReLU-gated drift toward an interior anchor. SOUNDNESS FIX (2026-07-03, F12): at d = 1 radial tangency forces the field to vanish at +-1, so both sphere points are fixed and the transport is impossible (with R0 > pi the ball is the whole two-point sphere; a Dirac at 1 refutes retention into B1 = {-1}); Appendix B's balls are proper caps."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.lemma_B_2"
paper     = "Lem B.2, p.31"
created   = "2026-06-30"

