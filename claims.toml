[claims.wasserstein-w2-finiteness]
kind      = "theorem"
statement = "Finiteness of the W2 Wasserstein distance for boundedly-supported probability measures (milestone M2, W2 discharge slice 3: the last foundation blocker before the flip). MACHINE-CHECKED. The ℝ-valued interface Axioms.W2 := (W2 . .).toReal is only faithful where W2 is finite (toReal sends ⊤ to 0, so a hypothesis-free ℝ triangle/convexity fact about a possibly-infinite W2 would be UNSOUND -- exactly the risk the Axioms/Wasserstein.lean comment flags). W2_ne_top_of_ae_norm_le: if mu, nu are probability measures a.e.-supported in the ball of radius R (in particular any measures on the unit sphere, R=1), then W2 mu nu != ⊤. Proof: the product coupling mu.prod nu (isCoupling_prod) moves mass across edist p.1 p.2 = ofReal (dist p.1 p.2) <= ofReal (2R) a.e. (the a.e. norm bounds transported to the product via Measure.quasiMeasurePreserving_fst/snd .ae + filter_upwards + norm_sub_le), so its squared cost is <= ofReal((2R)^2) < ⊤ (lintegral_mono_ae + lintegral_const + measure_univ on the product probability measure), and W2 <= (sqTransportCost)^(1/2) < ⊤ (ENNReal.rpow_ne_top_of_nonneg). #print axioms clean (propext/Classical.choice/Quot.sound). This is the finiteness the ℝ-valued .toReal bridge needs to discharge the W2 triangle/convexity/map axioms honestly; the remaining step is the flip of Axioms.W2 to concrete, threading this finiteness (with the sphere-support facts already in context) through Prop 2.2 / Lemma 5.2 / Thm 1.2."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.W2_ne_top_of_ae_norm_le"
paper     = "Wasserstein W2 finiteness for compactly-supported measures; optimal transport"
created   = "2026-07-02"

[claims.logistic-reach]
kind      = "theorem"
statement = "The finite-time logistic reaching estimate (milestone M4, lemma_B_2 slice 3: eq. B.5-B.7, the ODE crux). MACHINE-CHECKED. The gated characteristic obeys the scalar logistic ODE u' = g(1-u^2) (u = <x,omega>, gate g >= 0, leaf L2 gate_hasDerivAt_inner); on the active region g >= c0 > 0 the flow drives u toward 1 (x toward omega). Key device: the log-odds substitution logOdds s = log((1+s)/(1-s)) whose derivative along the flow is EXACTLY 2g (hasDerivAt_logOdds gives logOdds' = 2/(1-s^2); composed with u' = g(1-u^2) the 1-u^2 cancels), so logOdds(u) grows at rate >= 2c0. logistic_flow_logOdds_le: logOdds(u T) >= logOdds(u 0) + 2c0 T (monotoneOn_of_deriv_nonneg applied to F = logOdds(u) - 2c0 t). logistic_flow_reach: since logOdds is increasing on (-1,1), for any target b < 1 with logOdds b <= logOdds(u 0) + 2c0 T we get u T >= b -- the flow reaches the cap. The range u in (-1,1) is a hypothesis (supplied by the geometry, strict Cauchy-Schwarz for distinct unit vectors, not the ODE). #print axioms clean (propext/Classical.choice/Quot.sound). This is the make-or-break dynamical core of lemma_B_2 (B.7); it de-risks the whole M4 discharge. Remaining: the cutoff Block instantiation (slice 2) and the measure/preimage assembly (slice 4)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.logistic_flow_reach"
paper     = "Lemma B.2 eq. B.5-B.7 (logistic reaching of the gated flow); Appendix B"
created   = "2026-07-02"

[claims.ball-mass-continuity]
kind      = "theorem"
statement = "Measure continuity along a shrinking sublevel set (milestone M4, lemma_B_2 slice 1: eq. B.6). MACHINE-CHECKED. exists_closed_sublevel_mass_ge: for a continuous f and a measure with finite mass on the open sublevel {f < R}, any fraction 1-eps < 1 of that mass is already carried by a closed sublevel {f <= r} with r < R. Applied to f = d_g(z, .) this is the cap estimate the B.2 retention argument needs, mu(B(z,r)) >= (1-eps) mu(B(z,R)). Proof: continuity of measure from below (tendsto_measure_iUnion_atTop) along the increasing closed sublevels A n = {f <= R - 1/(n+1)}, whose union is the open sublevel; the target fraction is strictly below the finite limit (ENNReal.mul_lt_mul_right + ENNReal.sub_lt_self), hence eventually attained. #print axioms clean (propext/Classical.choice/Quot.sound). First slice of the lemma_B_2 discharge (M4); the hard cores -- the cutoff Block instantiation of the ReLU-gated field and the finite-time logistic reaching estimate (B.7) -- remain. Also flags a fidelity issue: the lemma_B_2 axiom is stated for arbitrary sets B0/B1, but B.2 requires geodesic balls, so a faithful discharge must restrict the signature."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.exists_closed_sublevel_mass_ge"
paper     = "Lemma B.2 eq. B.6 (mass of a shrunken cap); Appendix B"
created   = "2026-07-02"

[claims.w2-axiom-flip]
kind      = "theorem"
statement = "The W2 optimal-transport axiom flip (milestone M2 COMPLETE). MACHINE-CHECKED. Axioms/Wasserstein.lean formerly axiomatised W2 (opaque R-valued) with W2_nonneg / W2_comm / W2_triangle / W2_map_le_L2 / W2_convexCombo_le. Now Axioms.W2 mu nu := (Foundations.W2 mu nu).toReal is a DEFINITION and all five facts are proved THEOREMS over the ENNReal root Kantorovich cost. Because toReal sends top to 0, the honest R statements carry the hypotheses that make the ENNReal->R bridge sound: triangle/convexity carry per-pair finiteness (Foundations.W2 . . != top), discharged at the call sites from bounded/sphere support via W2_ne_top_of_ae_norm_le; the map bound carries measurability + L2-integrability of the displacement. Threading (contained -- prop_2_2 and lemma_5_2 have no consumers, theorem_1_1 does not use the structural facts): (a) prop_2_2 gains a supportedIn mu (sphere d) hypothesis and discharges convexity finiteness via new support-preservation helpers (supportedIn_of_sum_smul: a decomposition piece inherits the whole's support; measureFlow_supportedIn_sphere: the flow keeps the sphere; ae_norm_le_of_supportedIn_sphere), with the dirac targets bounded automatically (R = max 1 ||x k||); (b) the lemma_5_4 axiom is strengthened to expose Measurable psi_eps + L2-integrability (implicit in its integral bound being meaningful), which theorem_1_2 feeds to the map bound; (c) lemma_5_2 (leaf L7) becomes a thin wrapper and is now itself MACHINE-CHECKED. Effect: #print axioms theorem_1_1 / theorem_1_2 no longer list ANY W2/optimal-transport axiom; combined with the M3 flow flip, the ENTIRE infrastructure axiom layer is gone -- the headline theorems rest only on the paper-level mid-level lemmas (cluster_to_point, exists_disentangling_balls, exists_parked_schedule, lemma_5_4). Full audit passes."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Axioms.W2_map_le_L2"
paper     = "Wasserstein W2 (Section 5): the optimal-transport axiom layer, discharged"
created   = "2026-07-02"

