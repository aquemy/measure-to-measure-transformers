[claims.sierpinski-ivt]
kind      = "theorem"
statement = "Sierpinski's intermediate-value theorem for nonatomic measures (subset form). MACHINE-CHECKED (was an axiom, now fully proved). Real-line case (exists_measurableSet_subset_measure_eq_real): for a finite atomless measure mu on R, a measurable set E, and any target r <= mu E, there is a measurable subset F of E with mu F = r -- proved directly, the crux being that t |-> (mu(E cap Iic t)).toReal is continuous because its increment over [0,t] is the Bochner primitive int_0^t 1_E dmu (intervalIntegral.continuous_primitive, holds precisely because mu has NoAtoms), so it runs from 0 (t -> -inf, tendsto_measure_iInter_atBot) to (mu E).toReal (t -> +inf, tendsto_measure_iUnion_atTop) and the intermediate value theorem (intermediate_value_Icc) attains r.toReal at some t0; take F = E cap Iic t0. Standard-Borel case (exists_measurableSet_subset_measure_eq) reduces to the R-case by pushing mu forward along the measurable embedding embeddingReal into R (injective, so the pushforward stays finite and atomless), solving there, and pulling the subset back. Both #print axioms clean (propext/Classical.choice/Quot.sound). Classical theorem (Sierpinski 1922; Fremlin, Measure Theory Vol.2, 215D), previously absent from Mathlib. Soundness note: NoAtoms alone is insufficient on a coarse sigma-algebra (countable-cocountable 0/1 counterexample); the standard-Borel hypothesis is exactly what supplies the missing richness."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Foundations.exists_measurableSet_subset_measure_eq_real"
paper     = "Prop 2.2 (nonatomic splitting primitive)"
created   = "2026-07-01"

[claims.geodesic-convex-foundations]
kind      = "theorem"
statement = "Geodesic convexity on the sphere (milestone M5, foundations). MACHINE-CHECKED. A subset s of the unit sphere S^{d-1} is geodesically convex (GeodesicConvex) when it is closed under normalized positive chords: for x,y in s and a,b>0, the point ||a*x+b*y||^-1 * (a*x+b*y) lies in s. On an open hemisphere these normalized chords are exactly the minimizing geodesic arcs, so this is the faithful spherical analogue of ordinary convexity (pure inner-product characterization, no arccos). Key lemma geodesicConvex_open_hemisphere: an open spherical hemisphere {x in S | 0 < <e,x>} is geodesically convex -- the fact the paper uses for the orthant/hemisphere confinement (Lemma 3.2). Also: singletons are geodesically convex, and geodesic convexity is closed under arbitrary (nonempty-indexed) intersection, so an orthant (intersection of hemispheres) is geodesically convex. Mathlib has Convex/ConvexCone/SameRay but no geodesic convexity, so this is built in-repo. #print axioms clean. First slice toward the disentanglement geometry behind exists_disentangling_balls; generalizes leaf L11 (barycenter_noncolinear_of_disjoint_hull)."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.geodesicConvex_open_hemisphere"
paper     = "Section 3.3 (disentanglement geometry); Lemma 3.2 (hemisphere confinement)"
created   = "2026-07-01"

[claims.geodesic-hull-convex]
kind      = "theorem"
statement = "The geodesic hull is geodesically convex (milestone M5, hull bridge). MACHINE-CHECKED. Connects leaf L11's geodesicHull s = cone(s) cap S^{d-1} to the GeodesicConvex predicate: geodesicConvex_geodesicHull -- if every generator of s lies strictly on e's side (0 < <e,p>, i.e. s is in the open hemisphere of e), then geodesicHull s is geodesically convex. This is the 'hull = cone cap sphere is geodesic-convex' characterization the paper asserts when it calls conv_g geodesic-convex. Also geodesicHull_subset_hemisphere: the hull sits inside the open hemisphere of e. Together with geodesicConvex_open_hemisphere this gives the exact geometric picture behind Section 3.3 disentanglement (disjoint hulls inside a common hemisphere). Supporting facts inConicalSpan.add (cone closed under addition) and inner_pos_of_inConicalSpan (a nonzero conical point in e's hemisphere has 0 < <e,.>) proved too. #print axioms clean."
status    = "math.machine-checked"
lean      = "MeasureToMeasure.Leaves.geodesicConvex_geodesicHull"
paper     = "Section 3.3 (disentanglement); finding F2 (leaf L11)"
created   = "2026-07-01"

