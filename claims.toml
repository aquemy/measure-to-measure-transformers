# claims.toml: the CKC claim registry for measure-to-measure-transformers.
#
# One entry per slugged claim. The slug (table key) is what commit footers reference as
# `claim:<slug>` / `conjecture:<slug>`. `status` is a CACHE of the effective status computed from
# the commit graph; regenerate it, do not treat it as the source of truth.
#
# Source paper: Geshkovski, Rigollet, Ruiz-Balet, "Measure-to-measure interpolation using
# Transformers", arXiv:2411.04551v3 (references/paper.pdf).
#
# Status legend (axis 2, epistemic):
#   math.proved-informal  the paper proves it; reviewed by us, no Lean proof yet
#   math.axiomatised      stated in Lean, rests on a cited axiom (missing from Mathlib)
#   math.machine-checked  clean Lean kernel proof (Axioms: only propext/Classical.choice/Quot.sound)
#   sci.measured          a seeded numerical experiment ran and met its pass criterion

# ===========================================================================
# Main results
# ===========================================================================

[claims.thm-1-1]
kind      = "conjecture"
statement = "Theorem 1.1: for on-sphere Dirac targets and sphere-supported probability inputs sharing a missing direction, a single Transformer steers N inputs to within eps in W2, with O(d N) switches and norm O(dN/T + log 1/eps). (Sphere hypotheses threaded 2026-07-03, F12; the Lean statement does not yet carry the O(dN) switch budget or norm bound -- deferred to the mean-field restatement, F14.) MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow (the self-attention mean-field flow, Foundations/Attention.lean) with horizon clause durationSum = T and the paper's standing assumption Pairwise (mu_0^i != mu_0^j); proved by T/2+T/2 assembly (disentangle, cluster, park) over the mean-field schedule algebra. Footprint now includes exists_meanFieldFlow (correct: the result is about the mean-field dynamics). O(dN) switch and parameter-norm bounds deferred (non-explicit constants)."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.theorem_1_1"
paper     = "Thm 1.1, p.5"
created   = "2026-06-30"

[claims.thm-1-2]
kind      = "conjecture"
statement = "Theorem 1.2: for targets matchable by measurable a.e. sphere-valued transport maps and a shared missing direction, a single Transformer steers N sphere-supported probability inputs to within eps in W2 with piecewise-constant parameters. (Probability/sphere hypotheses and the sphere-valued Matchable clause threaded 2026-07-03, F12.) MEAN-FIELD RESTATEMENT (2026-07-03, F14 fix): stated over AttnSchedule/attnMeasureFlow with durationSum = T and Pairwise (mu_0^i != mu_0^j); the proof now uses exists_disentangling_balls' per-member flow maps and their on-sphere inverses (S = T^i o Phi_i^{-1}, the paper's B.4 composition) instead of the linear schedule inverse; hmiss_1 retained for statement fidelity though the parking axiom absorbs its use."
status    = "math.axiomatised"
lean      = "MeasureToMeasure.Statements.theorem_1_2"
paper     = "Thm 1.2, p.5"
created   = "2026-06-30"

