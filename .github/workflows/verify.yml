# Public, self-contained CI for this Lean blueprint project. On every push/PR it checks the four
# invariants that need no private tooling: the project COMPILES (lake build, including the
# Regression witnesses), passes the Batteries environment linters (`lake lint` via the lintDriver
# in lakefile.toml, with deliberate exemptions baselined in scripts/nolints.json), carries NO
# stray `sorry` / `admit` / `sorryAx` / `native_decide`, and passes the refutation regression
# gate (no axiom re-loosened to a kernel-refuted historical shape).
#
# It deliberately does NOT access any private plugin marketplace or the private claimgraph package,
# and it does NOT deploy anything (docs/ is committed by hand for classic GitHub Pages, served from
# main /docs). The FULL kernel-honesty audit -- axiom-report (`#print axioms`) + claimgraph
# audit/reconcile + blueprint checkdecls, wired in scripts/audit.sh -- depends on the private
# claimgraph + lean-math tools, so it runs LOCALLY via the pre-commit hooks, not in CI.
name: verify

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      # Build with the community Lean action (elan toolchain from lean-toolchain + Mathlib cache),
      # then lint: `lint: true` runs `lake lint`, which resolves the package's lintDriver
      # (`batteries/runLinter`) and runs the Batteries environment linters (unusedArguments,
      # docBlame, simpNF, defLemma, ...) over every declaration of both root modules.
      - name: Build and lint (lake)
        uses: leanprover/lean-action@v1
        with:
          build: true
          lint: true

      # Incompleteness / trust-widening sweep: mirror of scripts/audit.sh step 4, with no private
      # dependency. We do NOT gate on `axiom` declarations -- the labeled-axiom layer is the honest,
      # reviewed, kernel-visible infrastructure (its status is grounded locally by axiom-report).
      - name: Incompleteness sweep (no sorry / admit / sorryAx / native_decide)
        run: |
          hits="$(grep -rnE '\b(sorry|admit|sorryAx|native_decide)\b' MeasureToMeasure ForMathlib \
                    Regression --include='*.lean' 2>/dev/null || true)"
          if [ -n "$hits" ]; then
            echo "::error::incompleteness/trust-widening markers found:"
            echo "$hits"
            exit 1
          fi
          echo "clean: no sorry/admit/sorryAx/native_decide in the Lean tree."

      # Refutation regression gate: every Refutations/*.lean derives a kernel-refuted OLD axiom
      # statement from the CURRENT axiom and must FAIL to elaborate (must-fail adapters; the
      # must-pass half -- Regression witnesses + disproofs -- was built by lean-action above).
      # If one compiles, an axiom was re-loosened to a shape already proved false. Public deps only.
      - name: Refutation regression gate
        run: bash scripts/refutation-gate.sh --skip-build
