# Public, self-contained CI for this Lean blueprint project. On every push/PR it checks six
# invariants that need no private tooling: the project COMPILES (lake build, including the
# Regression witnesses), passes the Batteries environment linters (`lake lint` via the lintDriver
# in lakefile.toml, with deliberate exemptions baselined in scripts/nolints.json), carries NO
# stray `sorry` / `admit` / `sorryAx` / `native_decide`, passes the refutation regression
# gate (no axiom re-loosened to a kernel-refuted historical shape), has per-node axiom
# footprints free of sorryAx (scripts/axiom-report, vendored -- `#print axioms` per blueprint node),
# and has every \lean{...} blueprint reference resolve and compile (leanblueprint checkdecls, a
# public-PyPI, community-maintained cross-check on the same names axiom-report already resolves).
#
# It deliberately does NOT access any private plugin marketplace or the private claimgraph package,
# and it does NOT deploy anything (docs/ is committed by hand for classic GitHub Pages, served from
# main /docs). The claimgraph statuses (audit/reconcile/--require-fidelity) still run LOCALLY via
# scripts/audit.sh + the pre-commit hooks; CI covers everything else.
name: verify

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      # Build with the community Lean action (elan toolchain from lean-toolchain + Mathlib cache),
      # then lint: `lint: true` runs `lake lint`, which resolves the package's lintDriver
      # (`batteries/runLinter`) and runs the Batteries environment linters (unusedArguments,
      # docBlame, simpNF, defLemma, ...) over every declaration of both root modules.
      - name: Build and lint (lake)
        uses: leanprover/lean-action@v1
        with:
          build: true
          lint: true

      # Incompleteness / trust-widening sweep: mirror of scripts/audit.sh step 4, with no private
      # dependency. We do NOT gate on `axiom` declarations -- the labeled-axiom layer is the honest,
      # reviewed, kernel-visible infrastructure (its status is grounded locally by axiom-report).
      - name: Incompleteness sweep (no sorry / admit / sorryAx / native_decide)
        run: |
          hits="$(grep -rnE '\b(sorry|admit|sorryAx|native_decide)\b' MeasureToMeasure ForMathlib \
                    Regression --include='*.lean' 2>/dev/null || true)"
          if [ -n "$hits" ]; then
            echo "::error::incompleteness/trust-widening markers found:"
            echo "$hits"
            exit 1
          fi
          echo "clean: no sorry/admit/sorryAx/native_decide in the Lean tree."

      # Refutation regression gate: every Refutations/*.lean derives a kernel-refuted OLD axiom
      # statement from the CURRENT axiom and must FAIL to elaborate (must-fail adapters; the
      # must-pass half -- Regression witnesses + disproofs -- was built by lean-action above).
      # If one compiles, an axiom was re-loosened to a shape already proved false. Public deps only.
      - name: Refutation regression gate
        run: bash scripts/refutation-gate.sh --skip-build

      # Per-node axiom footprints (vendored axiom-report, zero private deps): #print axioms for
      # every \lean{...} blueprint node. Exit 3 is EXPECTED (the labeled-axiom layer reports
      # `axiom` rows); the gate here is that no node reports `sorryAx` -- a proof that regressed
      # to sorry would otherwise hide behind the grep sweep (which only sees source text, not
      # what a node's dependencies actually rest on).
      - name: Axiom footprints (vendored axiom-report)
        run: |
          rc=0
          scripts/axiom-report . --tex blueprint/src/content.tex > axiom-report-ci.txt || rc=$?
          if [ "$rc" != 0 ] && [ "$rc" != 3 ]; then
            echo "::error::axiom-report errored (exit $rc)"; cat axiom-report-ci.txt; exit 1
          fi
          cat axiom-report-ci.txt
          if grep -qE '\bsorryAx\b' axiom-report-ci.txt; then
            echo "::error::a blueprint node depends on sorryAx:"
            grep -E '\bsorryAx\b' axiom-report-ci.txt
            exit 1
          fi
          echo "footprints clean: no blueprint node depends on sorryAx."

      # Install uv (leanblueprint is a public PyPI package; no private tooling).
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # checkdecls (leanblueprint): confirms every \lean{...} name in the blueprint exists and
      # compiles. It overlaps almost entirely with what axiom-report above already requires --
      # axiom-report has to resolve the same names to print a footprint, and already hard-fails
      # on an unknown identifier -- so this is not the load-bearing check. It is an independent,
      # community-maintained implementation catching a bug in our own vendored one: cheap
      # insurance, not a new guarantee.
      - name: Blueprint checkdecls (leanblueprint)
        run: uvx leanblueprint checkdecls
